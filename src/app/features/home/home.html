<div class="home-container">
    <img class="dog-img" src="/assets/dog.webp" alt="Dog Sensei" >
    <h1 animate.enter="enter-animation">Welcome my young students to the path of the Dog</h1>
    <h2 class="subtext" animate.enter="enter-animation">Embrace your weekly duty</h2>

    <button animate.enter="enter-animation" mat-flat-button [disabled]="isRevealed" (click)="reveal()">
        <span class="quest-span">
            <span class="main">{{ mainQuestText }}</span>
            @if(subQuestText){
                <span class="sub">{{ subQuestText }}</span>
            }
        </span>
    </button>

    @if(isRevealed){
        <h2 class="next-date-text" animate.enter="enter-animation">
            Next mission in {{dayText}} {{hourText}} {{minuteText}} {{secondText}}
        </h2>
    }
</div>
